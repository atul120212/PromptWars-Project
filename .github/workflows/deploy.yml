name: Deploy to Google Cloud Run

on:
  push:
    branches: [main, master]

env:
  PROJECT_ID: mineral-weaver-491605-f6
  SERVICE_NAME: promptwars-project
  REGION: europe-west1          
  IMAGE: gcr.io/mineral-weaver-491605-f6/promptwars-project

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Configure Docker to use the gcloud credential helper
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # 5. Build the Docker image (inject API key as build-arg)
      - name: Build Docker image
        run: |
          docker build \
            --build-arg GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      # 6. Push to Google Container Registry
      - name: Push to GCR
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # 7. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      # 8. Print the service URL
      - name: Get Service URL
        run: |
          echo "✅ Deployed to:"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
